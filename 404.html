<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Not found — RemotePad</title>
<link rel="icon" type="image/svg+xml" href="assets/icon.svg" />
<link rel="stylesheet" href="styles.css" />
<style>
.notfound { text-align: center; padding: 120px 24px; max-width: 520px; margin: 0 auto; }
.notfound .code { font-size: clamp(72px, 12vw, 120px); font-weight: 800;
                  font-family: -apple-system, "SF Pro Rounded", system-ui, sans-serif;
                  color: var(--accent); margin: 0; letter-spacing: -0.04em; line-height: 1; }
.notfound h1 { font-family: -apple-system, "SF Pro Rounded", system-ui, sans-serif;
              font-size: 28px; margin: 22px 0 12px; }
.notfound p { color: var(--label2); font-size: 16px; line-height: 1.6; margin: 0 0 28px; }
</style>
</head>
<body>

<header class="topbar">
  <a href="./" class="brand">
    <img src="assets/icon.svg" alt="" class="brand-icon" />
    <span>RemotePad</span>
  </a>
</header>

<main>
<section class="notfound">
  <p class="code">404</p>
  <h1>That page isn't here.</h1>
  <p>It either moved, never existed, or got eaten by a stray Bonjour packet.</p>
  <a href="./" class="btn btn-primary">Back to RemotePad</a>
</section>
</main>

</body>
</html>
